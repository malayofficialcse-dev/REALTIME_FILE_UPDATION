type Workspace {
    id: ID!
    name: String!
    createdAt: String
    members: [WorkspaceMember]
    currentUserRole: String
    documents: [Document]
}

type WorkspaceMember {
    user: User
    role: String
}

type AnalyticsValue {
    label: String!
    value: Float!
    color: String
}

type MemberEngagement {
    username: String!
    updates: Int!
    chats: Int!
}

type UpdateFrequency {
    date: String!
    count: Int!
    type: String!
}

type WorkspaceAnalytics {
    assetDistribution: [AnalyticsValue]
    productivityTrend: [AnalyticsValue]
    resourceAllocation: [AnalyticsValue]
    memberEngagement: [MemberEngagement]
    updateFrequency: [UpdateFrequency]
    chatIntensity: [AnalyticsValue]
}

extend type Query {
    workspaces: [Workspace]
    workspace(id: ID!): Workspace
    workspaceAnalytics(id: ID!): WorkspaceAnalytics
}

extend type Mutation {
    createWorkspace(name: String!): Workspace
    addMember(workspaceId: ID!, email: String!, role: String): Workspace
    updateMemberRole(workspaceId: ID!, userId: ID!, role: String!): WorkspaceMember
    removeMember(workspaceId: ID!, userId: ID!): Boolean
}